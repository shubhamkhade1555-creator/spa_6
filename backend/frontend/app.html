<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salon Management System</title>
  <!-- Global Design Token System (load first) -->
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <!-- FullCalendar (global build) -->
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6/index.global.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6/index.global.js' defer></script>
  <!-- Font Awesome for icons used in action buttons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Chart.js for BI Dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <!-- Axios for API calls -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js" defer></script>
  <!-- Export Libraries - jsPDF, html2canvas, xlsx -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
  <script src="assets/js/lib/xlsx.min.js"></script>
  <script src="assets/js/lib/papaparse.min.js"></script>
  <script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div id="appLogo">
          <h2>Salon Manager</h2>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-link active" data-module="dashboard">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="12" width="4" height="8" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="9" y="8" width="4" height="12" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="15" y="4" width="4" height="16" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Dashboard</span>
        </a>
        <a href="#staff" class="nav-link" data-module="staff">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><path d="M2 7l6 6 4-4 10 10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Staff Management</span>
        </a>
        <a href="#customers" class="nav-link" data-module="customers">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Customers</span>
        </a>
        <a href="#services" class="nav-link" data-module="services">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8 6h8M8 10h8M8 14h6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Services</span>
        </a>
        <a href="#calendar" class="nav-link" data-module="calendar">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M16 3v4M8 3v4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Calendar</span>
        </a>
        <a href="#bookings" class="nav-link" data-module="bookings">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M16 3v4M8 3v4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Bookings</span>
        </a>
        <a href="#billing" class="nav-link" data-module="billing">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="7" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M16 11a2 2 0 1 1-4 0 2 2 0 0 1 4 0z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Billing</span>
        </a>
        <a href="#expenses" class="nav-link" data-module="expenses">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8 6h8M8 10h8M8 14h6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Expenses</span>
        </a>
        <a href="#memberships" class="nav-link" data-module="memberships">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" class="inline-icon" style="vertical-align:middle;display:inline-flex;transition:0.3s ease;" xmlns="http://www.w3.org/2000/svg"><path d="M8 21h8M12 17V7" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 3h10l-1 6a4 4 0 01-8 0L7 3z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </span>
          <span class="nav-text">Memberships</span>
        </a>

        <a href="#settings" class="nav-link" data-module="settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-text">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <span id="userName">User</span>
          <span id="userRole">Role</span>
        </div>
        <button id="logoutBtn" class="btn btn-outline btn-sm">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <h1 id="pageTitle">Dashboard</h1>
        <div class="header-actions">
          <span id="currentDate"></span>
        </div>
      </header>

      <div id="contentArea" class="content-area">
        <!-- Dynamic content will be loaded here -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Modal Title</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Modal content -->
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/permissions.js"></script>
  <script src="assets/js/theme-toggle.js"></script>
  <script src="assets/js/bi-dashboard-integrated.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
