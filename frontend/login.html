<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salon Management System - Login</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <!-- Font Awesome for icon rendering if needed on login page -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

<body class="login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>Salon Management System</h1>
        <p>Sign in to your account</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <div class="login-footer">
        <p>Default credentials:</p>
        <p>Owner: owner@gmail.com / owner@123</p>
        <p>Center: center@gmail.com / center@123</p>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script> <!-- Add this line -->
  <script src="assets/js/login.js"></script>
</body>

</html>
